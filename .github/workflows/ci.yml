name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    name: Frontend (Svelte)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ManufactPro/Frontend/ManufactPro-UI
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ManufactPro/Frontend/ManufactPro-UI/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build

  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum
      - run: go build ./...
      - run: go vet ./...
      - name: gofmt check
        run: test -z "$(gofmt -l .)" || { echo 'gofmt needed:'; gofmt -l .; exit 1; }
      - run: go test ./...
